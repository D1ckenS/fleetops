services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: fleetops
      POSTGRES_PASSWORD: fleetops_dev
      POSTGRES_DB: fleetops_shore
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U fleetops -d fleetops_shore']
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: fleetops_minio
      MINIO_ROOT_PASSWORD: fleetops_minio_dev
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.8
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: fleetops_meili_dev
      MEILI_ENV: development
    ports:
      - '7700:7700'
    volumes:
      - meili_data:/meili_data

  # ── Apache Superset (BI / embedded dashboards) ───────────────────────────────
  # Access the Superset UI at http://localhost:8088 (admin / fleetops_superset_dev).
  # On first start the init script runs db upgrade + create-admin + init, which
  # takes ~30 seconds. The container is healthy once port 8088 responds.
  superset:
    image: apache/superset:4.1.0
    restart: unless-stopped
    environment:
      SUPERSET_CONFIG_PATH: /app/superset_config.py
      SUPERSET_SECRET_KEY: fleetops-superset-dev-secret-change-me
      CYPRESS_CONFIG: 'false'
    volumes:
      - superset_home:/app/superset_home
      - ./superset_config.py:/app/superset_config.py:ro
    ports:
      - '8088:8088'
    depends_on:
      postgres:
        condition: service_healthy
    # Init on first start, then serve. Idempotent — safe to re-run.
    command: >
      bash -c "
        superset db upgrade &&
        superset fab create-admin
          --username admin
          --firstname Fleet
          --lastname Admin
          --email admin@fleetops.dev
          --password fleetops_superset_dev
          2>/dev/null || true &&
        superset init &&
        gunicorn
          --bind 0.0.0.0:8088
          --workers 2
          --worker-class gevent
          --timeout 120
          'superset.app:create_app()'
      "
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:8088/health || exit 1']
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 60s

volumes:
  postgres_data:
  minio_data:
  meili_data:
  superset_home:
